<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<article class="card" data-testid="test-todo-card">

  <div class="glow"></div>

  <div class="priority-dot high" data-testid="test-todo-priority-indicator"></div>

  <header class="card-header">
    <div class="left">
      <input type="checkbox" id="complete"
        data-testid="test-todo-complete-toggle"/>
      <label for="complete"></label>
    </div>

    <span class="status pending" data-testid="test-todo-status">
      ● Pending
    </span>
  </header>

  <h2 data-testid="test-todo-title">
    Finish Frontend Task (Stage 1)
  </h2>

  <div class="collapsible" data-testid="test-todo-collapsible-section">
    <p data-testid="test-todo-description" id="desc">
      Build a premium todo card with animations, clean UI (more interactive, stateful and app-like).
    </p>
  </div>

  <button class="expand-btn hidden"
    data-testid="test-todo-expand-toggle">
    Show more
  </button>

  <div class="meta">

    <span class="priority high"
      data-testid="test-todo-priority">
      High Priority
    </span>

    <time data-testid="test-todo-due-date" id="dueDate"></time>
    <time data-testid="test-todo-time-remaining" id="timeRemaining"></time>

    <span data-testid="test-todo-overdue-indicator" class="overdue"></span>

  </div>

  <select id="statusControl"
    data-testid="test-todo-status-control">

    <option>Pending</option>
    <option>In Progress</option>
    <option>Done</option>

  </select>

  <ul class="tags" data-testid="test-todo-tags">
    <li data-testid="test-todo-tag-school">HNG Internship</li>
    <li data-testid="test-todo-tag-frontend">Frontend</li>
  </ul>

  <div class="actions">
    <button data-testid="test-todo-edit-button" aria-label="Edit task">✏️</button>
    <button data-testid="test-todo-delete-button" aria-label="Delete task">🗑️</button>
  </div>

  <div class="edit-form hidden" data-testid="test-todo-edit-form">

    <input id="editTitle"
      data-testid="test-todo-edit-title-input"/>

    <textarea id="editDesc"
      data-testid="test-todo-edit-description-input"></textarea>

    <select id="editPriority"
      data-testid="test-todo-edit-priority-select">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <input type="datetime-local"
      id="editDue"
      data-testid="test-todo-edit-due-date-input"/>

    <div class="form-actions">

      <button data-testid="test-todo-save-button">
        Save
      </button>

      <button data-testid="test-todo-cancel-button">
        Cancel
      </button>

    </div>

  </div>

</article>

<script src="script.js"></script>
</body>
</html>
