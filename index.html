<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<article class="card" data-testid="test-todo-card">

  <div class="priority-indicator high" data-testid="test-todo-priority-indicator"></div>

  <header class="card-header">
    <div class="left">
      <input type="checkbox" data-testid="test-todo-complete-toggle" id="toggle"/>
      <label for="toggle"></label>
    </div>

    <span class="status" data-testid="test-todo-status">Pending</span>
  </header>

  <div id="viewMode">

    <h2 data-testid="test-todo-title" id="title">Finish Frontend Task</h2>

    <div class="collapsible" data-testid="test-todo-collapsible-section">
      <p data-testid="test-todo-description" id="description">
        Build an advanced todo card with editing, status syncing, and dynamic UI behavior.
      </p>
    </div>

    <button class="link-btn" data-testid="test-todo-expand-toggle">
      Show more
    </button>

    <div class="meta">
      <span data-testid="test-todo-priority">High</span>

      <time data-testid="test-todo-due-date" id="dueDate"></time>
      <time data-testid="test-todo-time-remaining" id="timeRemaining"></time>

      <span class="overdue" data-testid="test-todo-overdue-indicator"></span>
    </div>

    <select data-testid="test-todo-status-control" id="statusControl">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Done</option>
    </select>

    <ul data-testid="test-todo-tags">
      <li data-testid="test-todo-tag-school">School</li>
      <li data-testid="test-todo-tag-frontend">Frontend</li>
    </ul>

    <div class="actions">
      <button data-testid="test-todo-edit-button">Edit</button>
      <button data-testid="test-todo-delete-button">Delete</button>
    </div>

  </div>

  <form id="editForm" data-testid="test-todo-edit-form" class="hidden">

    <input data-testid="test-todo-edit-title-input" id="editTitle" />

    <textarea data-testid="test-todo-edit-description-input" id="editDesc"></textarea>

    <select data-testid="test-todo-edit-priority-select" id="editPriority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <input type="datetime-local" data-testid="test-todo-edit-due-date-input" id="editDue"/>

    <div class="form-actions">
      <button type="button" data-testid="test-todo-save-button">Save</button>
      <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
    </div>

  </form>

</article>

<script src="script.js"></script>
</body>
</html>
